name: Build Alectra Hui Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TARGET_RELEASE_REPO: ${{ vars.TARGET_RELEASE_REPO }}

concurrency:
  group: public-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare source workspace
        env:
          BUILD_BUNDLE_KEY: ${{ secrets.BUILD_BUNDLE_KEY }}
        run: |
          if (-not (Test-Path -LiteralPath payload.bin)) {
            $parts = @(Get-ChildItem -LiteralPath . -Filter 'payload.part.*' -File | Sort-Object Name)
            if ($parts.Count -eq 0) { throw 'No payload parts found.' }
            $out = [IO.File]::Open('payload.bin', [IO.FileMode]::Create, [IO.FileAccess]::Write, [IO.FileShare]::None)
            try {
              foreach ($part in $parts) {
                $bytes = [IO.File]::ReadAllBytes($part.FullName)
                $out.Write($bytes, 0, $bytes.Length)
              }
            } finally {
              $out.Dispose()
            }
          }
          ./scripts/runtime.ps1 -In payload.bin -Out workspace.zip
          Expand-Archive workspace.zip -DestinationPath source -Force

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compute version
        id: ver
        run: |
          $v = "1.0.$env:GITHUB_RUN_NUMBER"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Version: $v"

      - name: Publish self-contained app
        working-directory: source
        run: >
          dotnet publish AlectraHui/AlectraHui.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          -o publish

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        working-directory: source
        run: |
          $src = (Resolve-Path publish).Path
          & "C:\Program Files (x86)\NSIS\makensis.exe" "/DSRC=$src" "/DVERSION=${{ steps.ver.outputs.version }}" "installer\AlectraHui.nsi"
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }
          $named = "AlectraHui-Setup-v${{ steps.ver.outputs.version }}.exe"
          Copy-Item "AlectraHui-Setup.exe" $named
          Write-Host ("Installer: {0} ({1:N1} MB)" -f $named, ((Get-Item $named).Length/1MB))

      - name: Create private GitHub release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_RELEASE_TOKEN }}
        run: |
          $repo = if ([string]::IsNullOrWhiteSpace($env:TARGET_RELEASE_REPO)) { "The-Hui-Apps/AlectraHui" } else { $env:TARGET_RELEASE_REPO }
          gh release create "v${{ steps.ver.outputs.version }}" "source/AlectraHui-Setup-v${{ steps.ver.outputs.version }}.exe" `
            --repo "$repo" `
            --title "Alectra Hui v${{ steps.ver.outputs.version }}" `
            --notes "Automated public builder release. Run #$env:GITHUB_RUN_NUMBER from commit $env:GITHUB_SHA." `
            --latest

  lock-builder:
    runs-on: ubuntu-latest
    needs: [release]
    if: always()

    steps:
      - name: Lock builder
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_RELEASE_TOKEN }}
        shell: bash
        run: |
          current="$GITHUB_RUN_ID"
          active="$(
            {
              gh run list --repo "$GITHUB_REPOSITORY" --status queued --json databaseId --jq ".[] | select(.databaseId != $current) | .databaseId"
              gh run list --repo "$GITHUB_REPOSITORY" --status in_progress --json databaseId --jq ".[] | select(.databaseId != $current) | .databaseId"
              gh run list --repo "$GITHUB_REPOSITORY" --status waiting --json databaseId --jq ".[] | select(.databaseId != $current) | .databaseId"
              gh run list --repo "$GITHUB_REPOSITORY" --status requested --json databaseId --jq ".[] | select(.databaseId != $current) | .databaseId"
            } | sed '/^$/d' || true
          )"
          if [ -n "$active" ]; then
            echo "Another builder run is still active; leaving repository public."
            exit 0
          fi
          gh repo edit "$GITHUB_REPOSITORY" --visibility private --accept-visibility-change-consequences
